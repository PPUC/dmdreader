[platformio]
default_envs = ppucdmd

[env:ppucdmd]
platform = https://github.com/mkalkbrenner/platform-raspberrypi#issue-112
framework = arduino
board = pico
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

[env:ppucdmd2]
platform = https://github.com/mkalkbrenner/platform-raspberrypi#issue-112
framework = arduino
board = rpipico2
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
build_flags =
    -DRP2350

[env:alphadmd]
platform = https://github.com/mkalkbrenner/platform-raspberrypi#issue-112
framework = arduino
board = pico
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
build_flags =
    -DDE=2
    -DRDATA=3
    -DRCLK=4
    -DCOLLAT=5
    -DDOTCLK=6
    -DSDATA=7
