name: dmdreader
on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        run: |
          TAG=`cat VERSION`
          echo "${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
      - name: Check git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED_TAG="v${{ steps.version.outputs.tag }}"
          if [[ "${GIT_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Error: Git tag (${GIT_TAG}) does not match version string from VERSION file (v${{ steps.version.outputs.tag }})"
            exit 1
          fi

  build:
    name: Build dmdreader
    runs-on: ${{ matrix.os }}
    needs: [ version ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build elf2uf2 from source
        run: |
          sudo apt update && sudo apt install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi
          git clone https://github.com/ckormanyos/elf2uf2.git
          cd elf2uf2
          make all
          sudo cp bin/elf2uf2 /usr/local/bin/
          cd ..

      - name: Run PlatformIO
        run: |
          pio run

      - name: Create UF2 file (using elf2uf2)
        run: |
          ELF_FILE=$(find .pio/build/ -name "*.elf" | head -n 1)
          echo "Found ELF file: $ELF_FILE"
          elf2uf2 "$ELF_FILE" "${ELF_FILE%.elf}.uf2"
          cp ${ELF_FILE%.elf}.uf2 dmdreader.uf2
          cp "$ELF_FILE" dmdreader.elf
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmdreader-${{ needs.version.outputs.tag }}
          path: |
            dmdreader.elf
            dmdreader.uf2
            VERSION
            LICENSE
            README.md

  post-build:
    runs-on: ubuntu-latest
    needs: [ version, build ]
    name: Release
    steps:
      - uses: actions/download-artifact@v4
      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
            cd dmdreader-${{ needs.version.outputs.tag }}
            zip ../dmdreader-${{ needs.version.outputs.tag }}.zip dmdreader.elf dmdreader.uf2 VERSION LICENSE README.md
            cd ..

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          draft: true
          files: |
            dmdreader-${{ needs.version.outputs.tag }}.zip
